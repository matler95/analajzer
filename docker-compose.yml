services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analajzer
      POSTGRES_PASSWORD: analajzer
      POSTGRES_DB: analajzer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
